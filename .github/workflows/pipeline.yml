name: Pipeline JavaScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  executar-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verificar versão do Node
        run: node --version

      - name: Executar arquivo JavaScript
        run: node login.js

      - name: Armazenar artefato do projeto
        uses: actions/upload-artifact@v4
        with:
          name: login-js
          path: login.js